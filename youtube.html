<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Clone YouTube</title>
  <link rel="stylesheet" href="youtube.css">
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">YouTube</div>

      <div class="search">
        <input type="text" placeholder="Pesquisar">
        <button>🔍</button>
      </div>

      <div class="login">
        <button>Login</button>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main">
      <div class="video">
        <iframe 
          src="https://www.youtube.com/embed/dQw4w9WgXcQ"
          frameborder="0"
          allowfullscreen>
        </iframe>

        <h2>Título do vídeo</h2>
        <p>Canal • 1M visualizações • há 1 dia</p>
      </div>

      <!-- SIDEBAR -->
      <aside class="sidebar">

        <div class="card">
          <img src="https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
          <p>Vídeo recomendado 1</p>
        </div>

        <div class="card">
          <img src="https://i.ytimg.com/vi/3JZ_D3ELwOQ/hqdefault.jpg">
          <p>Vídeo recomendado 2</p>
        </div>

        <div class="card">
          <img src="https://i.ytimg.com/vi/tgbNymZ7vqY/hqdefault.jpg">
          <p>Vídeo recomendado 3</p>
        </div>

      </aside>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <h3>Comentários</h3>

      <div class="comment">
        <strong>Usuário 1:</strong> Muito bom!
      </div>

      <div class="comment">
        <strong>Usuário 2:</strong> Top demais 🔥
      </div>

    </footer>

  </div>

</body>
</html>
